name: Claude

# Mention @claude on an issue or PR (or in a review comment) and Claude Code
# runs here with Mac access, so it can run the release battery and push fixes.
#
# NOTE: the action is officially documented for ubuntu-latest; we deliberately
# run on macos-15 so the agent can build/test this AppKit app. It's a Node/CLI
# action so this works, but it isn't an Anthropic-supported configuration — if
# the action itself ever misbehaves on macOS, split it: run the action on
# ubuntu-latest for triage and let the "macOS battery" workflow (ci-macos.yml)
# do the building.
#
# Setup (one-time, repo admin): install the Claude GitHub App
# (https://github.com/apps/claude) and add an ANTHROPIC_API_KEY secret — the
# Claude Code CLI `/install-github-app` does both. Pro/Max users can instead
# add CLAUDE_CODE_OAUTH_TOKEN and swap the `with:` input below.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write        # push fixes to the branch
  pull-requests: write
  issues: write
  id-token: write        # OIDC
  actions: read          # read CI results (the macOS battery)

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # So the agent's Bash inherits a Swift 6-capable toolchain / DEVELOPER_DIR.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Let the agent run the battery and commit fixes. Scope Bash to the
          # build/test tools plus git; widen if you need more.
          claude_args: |
            --allowedTools "Read,Edit,Write,Bash(swift:*),Bash(swift package:*),Bash(scripts/build-app.sh:*),Bash(./build/Designer.app/Contents/MacOS/Designer:*),Bash(caffeinate:*),Bash(git:*)"
